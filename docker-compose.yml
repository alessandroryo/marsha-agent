services:

  # ── Database ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - marsha-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.8.0-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - marsha-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Hermes AI Agent ──────────────────────────────────────
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - hermes_data:/opt/data
      - ./infra/hermes/config.yaml:/opt/data/config.yaml:ro
      - ./hermes-skills:/opt/data/skills:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - marsha-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # ── FastAPI Gateway ───────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      target: production
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      API_SECRET_KEY: ${API_SECRET_KEY}
    networks:
      - marsha-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# ── Networks ──────────────────────────────────────────────
networks:
  marsha-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  hermes_data:
