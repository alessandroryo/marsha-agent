services:

  # ── Hermes AI Agent ──────────────────────────────────────
  # /opt/data = HERMES_HOME: dikelola & DITULIS Hermes (config, SOUL, skills bundled +
  # .hub, sessions, memories, logs, auth, profiles). Lihat docs/how-to/hermes-docker.md.
  #
  # ATURAN PENTING: JANGAN meng-overlay subdir yang ditulis Hermes (mis. /opt/data/skills)
  # sebagai read-only — itu memblok chown-sweep saat boot dan bikin Permission denied.
  # Pola mount (hybrid, ramah git):
  #   - named volume hermes_data → /opt/data        : state runtime persisten (di-chown tiap boot)
  #   - config.yaml & SOUL.md    → read-only file    : versioned, boleh diedit di host
  #   - skill custom             → /opt/data/external-skills (ro) + skills.external_dirs di config
  # Permission self-heal: stage2 chown-sweep jalan tiap boot (uid 10000). CLI `hermes` via
  # `docker exec` otomatis drop ke uid 10000 (shim) — jangan tulis /opt/data via sh/chown root.
  #
  # postgres & redis DIHAPUS SEMENTARA (2026-07) -- tidak ada konsumen aktif: MCP nonaktif,
  # api-gateway (penulis Postgres) sudah dihapus, quant-bot (penulis Redis telemetry) belum
  # pernah ada, dan pipeline analisis sekarang pakai in-session context, bukan whiteboard
  # Redis. Tambahkan lagi begitu quant-bot/MCP digarap.
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    shm_size: "1g"                          # image bawa Playwright/Chromium — cegah crash shm
    ports:
      - "8642:8642"                         # gateway API
      - "127.0.0.1:9119:9119"               # dashboard — HANYA loopback host (lihat env di bawah)
    volumes:
      - hermes_data:/opt/data
      - ./infra/hermes/config.yaml:/opt/data/config.yaml:ro
      - ./infra/hermes/SOUL.md:/opt/data/SOUL.md:ro
      - ./infra/hermes/skills:/opt/data/external-skills:ro
      - ./infra/hermes/scripts:/opt/data/scripts:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
      # Dashboard monitoring (opsional). INSECURE aman di sini KARENA port hanya
      # dipublish ke 127.0.0.1 host. Jangan pakai INSECURE bila port diekspos ke jaringan.
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_INSECURE=1
    networks:
      - marsha-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G

# ── Networks ──────────────────────────────────────────────
networks:
  marsha-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────
volumes:
  hermes_data:
